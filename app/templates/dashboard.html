<!DOCTYPE html>
<html>
<head>
    <title>Dashboard DDT</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .cards { display: flex; gap: 20px; }
        .card {
            padding: 20px;
            background: #f2f2f2;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            font-size: 18px;
        }
        table {
            margin-top: 40px;
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>

<h1>📊 Dashboard DDT</h1>

<div class="cards">
    <div class="card">
        <b>Totale DDT</b><br>
        {{ totale_ddt }}
    </div>

    <div class="card">
        <b>Quantità Totale</b><br>
        {{ totale_quantita }}
    </div>

    <div class="card">
        <b>Cantieri</b><br>
        {{ totale_cantieri }}
    </div>

    <div class="card">
        <b>Veicoli</b><br>
        {{ totale_veicoli }}
    </div>
</div>

<h2>📦 Riepilogo per Cantiere</h2>

<table>
    <tr>
        <th>Cantiere</th>
        <th>Numero DDT</th>
        <th>Totale Quantità</th>
    </tr>

    {% for r in report %}
    <tr>
        <td>{{ r.Cantiere }}</td>
        <td>{{ r.NumeroDDT }}</td>
        <td>{{ r.TotaleQuantita }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
