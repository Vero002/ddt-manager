<!DOCTYPE html>
<html>
<head>
    <title>Nuova Bolla DDT</title>
</head>
<body>

<h2>Inserisci Nuova Bolla</h2>

<form action="/ddt" method="post">
    
    <label>Numero DDT:</label><br>
    <input type="text" name="NumeroDDT"><br><br>

    <label>Data DDT:</label><br>
    <input type="date" name="DataDDT"><br><br>

    <label>Cantiere ID:</label><br>
    <input type="number" name="CantiereId"><br><br>

    <label>Veicolo ID:</label><br>
    <input type="number" name="VeicoloId"><br><br>

    <label>Materiale:</label><br>
    <input type="text" name="Materiale"><br><br>

    <label>Quantità:</label><br>
    <input type="number" step="0.01" name="Quantita"><br><br>

    <label>Note:</label><br>
    <textarea name="Note"></textarea><br><br>

    <button type="submit">Salva DDT</button>

</form>

</body>
</html>
