{% extends "base.html" %}
{% block content %}
<h2>DDT</h2>

<form method="post">
    Numero: <input type="text" name="numero">
    Descrizione: <input type="text" name="descrizione">

    Veicolo:
    <select name="veicolo_id">
        {% for v in veicoli %}
            <option value="{{ v.id }}">{{ v.targa }}</option>
        {% endfor %}
    </select>

    Cantiere:
    <select name="cantiere_id">
        {% for c in cantieri %}
            <option value="{{ c.id }}">{{ c.nome }}</option>
        {% endfor %}
    </select>

    <button type="submit">Crea DDT</button>
</form>

<ul>
{% for d in ddt %}
    <li>
        {{ d.numero }} -
        {{ d.descrizione }} -
        {{ d.veicolo.targa if d.veicolo else "Nessun veicolo" }} -
        {{ d.cantiere.nome if d.cantiere else "Nessun cantiere" }}
    </li>
{% endfor %}
</ul>
