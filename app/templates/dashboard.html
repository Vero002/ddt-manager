{% extends "base.html" %}
{% block content %}

<h2>Dashboard DDT</h2>

<form method="get" action="/dashboard"> 

    <label>Città:</label>
    <input type="text" name="citta" value="{{ citta or '' }}">

    <label>Veicolo:</label>
    <select name="veicolo_id">
        <option value="">Tutti</option>
        {% for v in veicoli %}
        <option value="{{ v.id }}"
            {% if veicolo_id and veicolo_id == v.id %}selected{% endif %}>
            {{ v.targa }} - {{ v.modello }}
        </option>
        {% endfor %}
    </select>

    <button type="submit">Filtra</button>
</form>

<hr>

<h3>Risultati</h3>

<table border="1">
    <tr>
        <th>Numero</th>
        <th>Descrizione</th>
        <th>Veicolo</th>
        <th>Cantiere</th>
    </tr>
    {% for d in ddt %}
    <tr>
        <td>{{ d.numero }}</td>
        <td>{{ d.descrizione }}</td>
        <td>{{ d.veicolo.targa }}</td>
        <td>{{ d.cantiere.indirizzo }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
